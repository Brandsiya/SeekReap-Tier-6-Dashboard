steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/seekreap-backend', '.']

  # 2. Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/seekreap-backend']

  # 3. Deploy the Backend (API/Dashboard)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'seekreap-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/seekreap-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'DB_NAME=seekreap_neon_db,DB_USER=neondb_owner,DB_HOST=ep-rapid-base-ai27r1sa-pooler.c-4.us-east-1.aws.neon.tech,DB_PORT=5432,DB_SSLMODE=require,DB_PASSWORD=npg_yX7aHMwIqQC4'

  # 4. Deploy the Worker Service (using the same image but different command)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'seekreap-worker'
      - '--image'
      - 'gcr.io/$PROJECT_ID/seekreap-backend'
      - '--command'
      - 'python,run_worker.py'
      - '--region'
      - 'us-central1'
      - '--set-env-vars'
      - 'DATABASE_URL=postgres://neondb_owner:npg_yX7aHMwIqQC4@ep-rapid-base-ai27r1sa-pooler.c-4.us-east-1.aws.neon.tech/seekreap_neon_db?sslmode=require'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/seekreap-backend'
